<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>예약하기</title>
    <link rel="stylesheet" href="css/res.css" />
  </head>
  <body>
    <header class="header">
      <button type="button" class="btn-book-now">이전으로</button>
    </header>

    <main class="container">
      <h1 class="main-title">Select Dates & Times</h1>

      <div class="picker-wrapper">
        <section class="calendar-card">
          <div class="calendar-header">
            <button type="button" class="nav-btn">&lt;</button>
            <h2>July 2026</h2>
            <button type="button" class="nav-btn">&gt;</button>
          </div>

          <div class="calendar-grid">
            <div class="day-name">Sun</div>
            <div class="day-name">Mon</div>
            <div class="day-name">Tue</div>
            <div class="day-name">Wed</div>
            <div class="day-name">Thu</div>
            <div class="day-name">Fri</div>
            <div class="day-name">Sat</div>

            <div class="day prev-month">28</div>
            <div class="day prev-month">29</div>
            <div class="day prev-month">30</div>
            <div class="day">1</div>
            <div class="day">2</div>
            <div class="day style-bg">3</div>
            <div class="day style-bg">4</div>

            <div class="day">5</div>
            <div class="day style-bg">6</div>
            <div class="day selected">7</div>
            <div class="day style-bg">8</div>
            <div class="day style-bg">9</div>
            <div class="day style-bg">10</div>
            <div class="day style-bg">11</div>

            <div class="day style-bg">12</div>
            <div class="day style-bg">13</div>
            <div class="day style-bg">14</div>
            <div class="day style-bg">15</div>
            <div class="day style-bg">16</div>
            <div class="day style-bg">17</div>
            <div class="day style-bg">18</div>

            <div class="day style-bg">19</div>
            <div class="day style-bg">20</div>
            <div class="day style-bg">21</div>
            <div class="day style-bg">22</div>
            <div class="day style-bg">23</div>
            <div class="day style-bg">24</div>
            <div class="day style-bg">25</div>

            <div class="day style-bg">26</div>
            <div class="day style-bg">27</div>
            <div class="day style-bg">28</div>
            <div class="day style-bg">29</div>
            <div class="day style-bg">30</div>
            <div class="day style-bg">31</div>
            <div class="day next-month">1</div>

            <div class="day next-month">2</div>
            <div class="day next-month">3</div>
            <div class="day next-month">4</div>
            <div class="day next-month">5</div>
            <div class="day next-month">6</div>
            <div class="day next-month">7</div>
            <div class="day next-month">8</div>
          </div>
        </section>

        <form action="res_ok.html" method="GET" class="time-slots-wrapper">
          <div class="time-slots">
            <label class="time-btn-label">
              <input type="radio" name="selected_time" value="10:00" required />
              <span>10:00 AM</span>
            </label>

            <label class="time-btn-label">
              <input
                type="radio"
                name="selected_time"
                value="11:30"
                checked
                required
              />
              <span>11:30 AM</span>
            </label>

            <label class="time-btn-label">
              <input type="radio" name="selected_time" value="13:00" required />
              <span>1:00 PM</span>
            </label>

            <label class="time-btn-label">
              <input type="radio" name="selected_time" value="14:30" required />
              <span>2:30 PM</span>
            </label>

            <label class="time-btn-label">
              <input type="radio" name="selected_time" value="14:30" required />
              <span>3:30 PM</span>
            </label>
          </div>

          <button type="submit" class="btn-confirm">예약하기</button>
        </form>
      </div>
    </main>
  </body>
</html>
