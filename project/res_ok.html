<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking Confirmed</title>
    <link rel="stylesheet" href="css/res_ok.css" />
  </head>
  <body>
    <main class="success-container">
      <div class="success-card">
        <div class="icon-check">✓</div>
        <h1 class="success-title">Reservation Confirmed!</h1>
        <p class="success-message">
          선택하신 내역으로 예약 신청이 완료되었습니다.
        </p>

        <div class="info-box">
          <div class="info-item">
            <span class="info-label">상태</span>
            <span class="info-value status-text">예약 완료</span>
          </div>
          <div class="info-item">
            <span class="info-label">안내</span>
            <span class="info-value">확정 문자가 곧 발송됩니다.</span>
          </div>
        </div>

        <button
          type="button"
          class="btn-home"
          onclick="location.href='main2.html'"
        >
          홈으로 돌아가기
        </button>
      </div>
    </main>
  </body>
</html>
